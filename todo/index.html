<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="todo/style.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h1>My To-Do List</h1>
            
            <div class="input-section">
                <input type="text" id="todoInput" placeholder="Add a new task..." autocomplete="off">
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>

            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="stats">
                <span>Total: <span id="totalTasks">0</span></span>
                <span>Completed: <span id="completedTasks">0</span></span>
            </div>

            <ul id="todoList" class="todo-list"></ul>

            <div class="action-buttons">
                <button id="clearCompleted" class="clear-btn">Clear Completed</button>
                <button id="deleteAll" class="delete-btn">Delete All</button>
            </div>
        </div>
    </div>

    <script src="todo/script.js"></script>
</body>
</html>
